name: deploy-cloudflare

on:
  workflow_run:
    workflows:
      - testing
    branches:
      - main
    types:
      - completed

concurrency:
  group: deploy-cloudflare-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write
  pull-requests: write

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=min-cal-tracker
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish deployment URL
        if: always()
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
        run: |
          {
            echo "## Cloudflare Deploy"
            echo
            echo "- Deployment URL: $DEPLOYMENT_URL"
            echo "- Alias URL: ${{ steps.deploy.outputs.pages-deployment-alias-url }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment deployment URL on PR
        if: ${{ steps.deploy.outputs.pages-deployment-alias-url != '' || steps.deploy.outputs.deployment-url != '' }}
        uses: actions/github-script@v7
        env:
          DEPLOYMENT_URL: ${{ steps.deploy.outputs.pages-deployment-alias-url || steps.deploy.outputs.deployment-url }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.workflow_run.head_sha;
            const url = process.env.DEPLOYMENT_URL;
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: sha,
            });

            if (!prs.data.length) {
              core.info(`No PR found for ${sha}; skipping comment.`);
              return;
            }

            const body = `Cloudflare deploy is live: ${url}`;

            for (const pr of prs.data) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pr.number,
                body,
              });
            }
