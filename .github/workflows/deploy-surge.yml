name: Deploy to Surge

on:
  push:
    branches: [main]

concurrency:
  group: surge-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate required secrets
        run: |
          test -n "${VITE_SUPABASE_URL}" || (echo "Missing VITE_SUPABASE_URL GitHub secret" && exit 1)
          test -n "${VITE_SUPABASE_ANON_KEY}" || (echo "Missing VITE_SUPABASE_ANON_KEY GitHub secret" && exit 1)
          test -n "${SURGE_DOMAIN}" || (echo "Missing SURGE_DOMAIN GitHub secret" && exit 1)
          test -n "${SURGE_TOKEN}" || (echo "Missing SURGE_TOKEN GitHub secret" && exit 1)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SURGE_DOMAIN: ${{ secrets.SURGE_DOMAIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy
        run: npx --yes surge@latest ./dist "${SURGE_DOMAIN}" --token "${SURGE_TOKEN}"
        env:
          SURGE_DOMAIN: ${{ secrets.SURGE_DOMAIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
